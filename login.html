<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · GovCert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Poppins', sans-serif; background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d0 50%, #d4c8b0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    :root { --primary: #123A78; --gold: #C89A28; --light-gold: #E8C96B; }
    
    .login-container { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-radius: 32px; padding: 48px; max-width: 420px; width: 100%; box-shadow: 0 30px 60px -20px rgba(18,58,120,0.3), inset 0 1px 0 rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.6); }
    .login-container .logo { text-align: center; margin-bottom: 32px; }
    .login-container .logo i { font-size: 48px; color: var(--gold); }
    .login-container .logo h1 { font-size: 28px; font-weight: 700; color: var(--primary); font-family: 'Montserrat', sans-serif; margin-top: 8px; }
    .login-container .logo p { color: #666; font-size: 14px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #333; }
    .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; transition: 0.2s; font-family: inherit; background: rgba(255,255,255,0.8); }
    .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(18,58,120,0.1); }
    
    .btn-login { width: 100%; background: var(--primary); color: white; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-login:hover { background: #0e2f62; transform: scale(1.02); box-shadow: 0 8px 24px rgba(18,58,120,0.3); }
    
    .back-link { display: block; text-align: center; margin-top: 16px; color: var(--primary); text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
    
    .error-msg { background: #fee; color: #c0392b; padding: 10px 14px; border-radius: 10px; font-size: 14px; display: none; margin-bottom: 16px; border-left: 4px solid #c0392b; }
    .success-msg { background: #e8f5e9; color: #27ae60; padding: 10px 14px; border-radius: 10px; font-size: 14px; display: none; margin-bottom: 16px; border-left: 4px solid #27ae60; }
    
    .login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
    .register-link { color: var(--primary); font-weight: 600; cursor: pointer; }
    .register-link:hover { text-decoration: underline; }
    
    .toggle-form { text-align: center; margin-top: 12px; font-size: 14px; color: #666; }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <i class="fas fa-award"></i>
    <h1>GovCert</h1>
    <p>Event & Certificate Management System</p>
  </div>
  
  <div id="error-msg" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="error-text">Invalid credentials. Please try again.</span></div>
  <div id="success-msg" class="success-msg"><i class="fas fa-check-circle"></i> <span id="success-text">Registration successful! Please login.</span></div>
  
  <!-- Login Form -->
  <form id="login-form">
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="email" placeholder="Enter your email" required />
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
  </form>
  
  <div class="toggle-form">
    Don't have an account? <span class="register-link" onclick="showRegister()">Register here</span>
  </div>
  
  <!-- Registration Form (hidden by default) -->
  <form id="register-form" style="display:none;margin-top:20px;">
    <div class="form-group">
      <label><i class="fas fa-user"></i> Full Name</label>
      <input type="text" id="reg-fullname" placeholder="Enter your full name" required />
    </div>
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="reg-email" placeholder="Enter your email" required />
    </div>
    <div class="form-group">
      <label><i class="fas fa-phone"></i> Phone Number (will be used as password)</label>
      <input type="tel" id="reg-phone" placeholder="Enter your phone number" required />
    </div>
    <div class="form-group">
      <label><i class="fas fa-map-marker-alt"></i> District</label>
      <input type="text" id="reg-district" placeholder="Enter your district" value="KICUKIRO" />
    </div>
    <div class="form-group">
      <label><i class="fas fa-map-pin"></i> Sector</label>
      <input type="text" id="reg-sector" placeholder="Enter your sector" />
    </div>
    <div class="form-group">
      <label><i class="fas fa-home"></i> Village</label>
      <input type="text" id="reg-village" placeholder="Enter your village" />
    </div>
    <div class="form-group">
      <label><i class="fas fa-building"></i> Organization</label>
      <input type="text" id="reg-organization" placeholder="Enter your organization" />
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-user-plus"></i> Register</button>
    <div class="toggle-form" style="margin-top:12px;">
      Already have an account? <span class="register-link" onclick="showLogin()">Login here</span>
    </div>
  </form>
  
  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
  <div class="login-footer">© 2025 GovCert. All rights reserved.</div>
</div>

<script>
function showRegister() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('register-form').style.display = 'block';
  document.querySelector('.toggle-form').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function showLogin() {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('register-form').style.display = 'none';
  document.querySelector('.toggle-form').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

// Handle Login
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('error-msg');
  const errorText = document.getElementById('error-text');
  
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (data.success) {
      localStorage.setItem('govcert_user', JSON.stringify(data.user));
      window.location.href = data.redirect;
    } else {
      errorText.textContent = data.error || 'Invalid credentials. Please try again.';
      errorMsg.style.display = 'block';
    }
  } catch (error) {
    errorText.textContent = 'Server error. Please try again.';
    errorMsg.style.display = 'block';
  }
});

// Handle Registration
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const full_name = document.getElementById('reg-fullname').value;
  const email = document.getElementById('reg-email').value;
  const phone = document.getElementById('reg-phone').value;
  const district = document.getElementById('reg-district').value || 'KICUKIRO';
  const sector = document.getElementById('reg-sector').value || '';
  const village = document.getElementById('reg-village').value || '';
  const organization = document.getElementById('reg-organization').value || '';
  
  const errorMsg = document.getElementById('error-msg');
  const errorText = document.getElementById('error-text');
  const successMsg = document.getElementById('success-msg');
  const successText = document.getElementById('success-text');
  
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, phone, full_name, district, sector, village, organization })
    });
    
    const data = await response.json();
    
    if (data.success) {
      successText.textContent = 'Registration successful! Please login with your phone number as password.';
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
      
      // Switch to login form after 2 seconds
      setTimeout(() => {
        showLogin();
        document.getElementById('email').value = email;
        document.getElementById('password').value = phone;
        successMsg.style.display = 'none';
      }, 3000);
    } else {
      errorText.textContent = data.error || 'Registration failed. Please try again.';
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }
  } catch (error) {
    errorText.textContent = 'Server error. Please try again.';
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
  }
});

// Auto-login check for session
document.addEventListener('DOMContentLoaded', async function() {
  try {
    const response = await fetch('/api/session');
    const data = await response.json();
    if (data.success) {
      localStorage.setItem('govcert_user', JSON.stringify(data.user));
      if (data.user.role === 'admin') {
        window.location.href = '/admin-dashboard.html';
      } else {
        window.location.href = '/user-dashboard.html';
      }
    }
  } catch (error) {
    // Session check failed, user can login
  }
});
</script>
</body>
</html>
