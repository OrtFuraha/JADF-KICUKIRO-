<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Poppins', sans-serif; background: #F7F8FA; color: #1E1E1E; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px; }
    h1 { font-size: 72px; color: #123A78; font-family: 'Montserrat', sans-serif; }
    p { font-size: 18px; color: #666; margin: 20px 0; }
    a { color: #123A78; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="/">← Back to Homepage</a>
  </div>
</body>
</html>
